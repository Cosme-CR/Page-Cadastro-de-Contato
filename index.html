<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="./app.js" defer type="module"></script>

  <title>Cadastro</title>
</head>

<body class="min-h-screen bg-gradient-to-br from-black via-slate-900 to-blue-900 flex items-center justify-center p-6">

  <main class="w-full max-w-5xl bg-white/10 backdrop-blur-lg border border-white/10 rounded-3xl shadow-2xl p-8 md:p-12">

    <h1 class="text-white text-5xl font-bold text-center mb-12 tracking-wider">
      Cadastro
    </h1>

    <div class="flex flex-col md:flex-row gap-6 mb-6">

      <div class="relative w-full">
        <input
          type="text"
          id="nome"
          required
          placeholder=" "
          class="peer w-full bg-white/5 border border-white/20 rounded-xl px-4 pt-6 pb-2 text-white outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-500 transition"
        />
        <label
          for="nome"
          class="absolute left-4 top-4 text-slate-300 transition-all peer-placeholder-shown:top-4 peer-placeholder-shown:text-base peer-focus:-top-2 peer-focus:text-sm peer-focus:text-blue-400 peer-valid:-top-2 peer-valid:text-sm peer-valid:text-blue-400 bg-slate-900 px-1 rounded"
        >
          Nome
        </label>
      </div>

      <div class="relative w-full">
        <input
          type="text"
          id="foto"
          required
          placeholder=" "
          class="peer w-full bg-white/5 border border-white/20 rounded-xl px-4 pt-6 pb-2 text-white outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-500 transition"
        />
        <label
          for="foto"
          class="absolute left-4 top-4 text-slate-300 transition-all peer-placeholder-shown:top-4 peer-placeholder-shown:text-base peer-focus:-top-2 peer-focus:text-sm peer-focus:text-blue-400 peer-valid:-top-2 peer-valid:text-sm peer-valid:text-blue-400 bg-slate-900 px-1 rounded"
        >
          Link da Foto
        </label>
      </div>

    </div>

    <div class="flex flex-col md:flex-row gap-6 mb-8">

      <div class="relative w-full">
        <input
          type="text"
          id="telefone"
          required
          placeholder=" "
          class="peer w-full bg-white/5 border border-white/20 rounded-xl px-4 pt-6 pb-2 text-white outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-500 transition"
        />
        <label
          for="telefone"
          class="absolute left-4 top-4 text-slate-300 transition-all peer-placeholder-shown:top-4 peer-placeholder-shown:text-base peer-focus:-top-2 peer-focus:text-sm peer-focus:text-blue-400 peer-valid:-top-2 peer-valid:text-sm peer-valid:text-blue-400 bg-slate-900 px-1 rounded"
        >
          Número
        </label>
      </div>

      <div class="relative w-full">
        <input
          type="email"
          id="email"
          required
          placeholder=" "
          class="peer w-full bg-white/5 border border-white/20 rounded-xl px-4 pt-6 pb-2 text-white outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-500 transition"
        />
        <label
          for="email"
          class="absolute left-4 top-4 text-slate-300 transition-all peer-placeholder-shown:top-4 peer-placeholder-shown:text-base peer-focus:-top-2 peer-focus:text-sm peer-focus:text-blue-400 peer-valid:-top-2 peer-valid:text-sm peer-valid:text-blue-400 bg-slate-900 px-1 rounded"
        >
          Email
        </label>
      </div>

      <div class="relative w-full">
        <input
          type="text"
          id="endereco"
          required
          placeholder=" "
          class="peer w-full bg-white/5 border border-white/20 rounded-xl px-4 pt-6 pb-2 text-white outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-500 transition"
        />
        <label
          for="endereco"
          class="absolute left-4 top-4 text-slate-300 transition-all peer-placeholder-shown:top-4 peer-placeholder-shown:text-base peer-focus:-top-2 peer-focus:text-sm peer-focus:text-blue-400 peer-valid:-top-2 peer-valid:text-sm peer-valid:text-blue-400 bg-slate-900 px-1 rounded"
        >
          Endereço
        </label>
      </div>

      <div class="relative w-full">
        <input
          type="text"
          id="cidade"
          required
          placeholder=" "
          class="peer w-full bg-white/5 border border-white/20 rounded-xl px-4 pt-6 pb-2 text-white outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-500 transition"
        />
        <label
          for="cidade"
          class="absolute left-4 top-4 text-slate-300 transition-all peer-placeholder-shown:top-4 peer-placeholder-shown:text-base peer-focus:-top-2 peer-focus:text-sm peer-focus:text-blue-400 peer-valid:-top-2 peer-valid:text-sm peer-valid:text-blue-400 bg-slate-900 px-1 rounded"
        >
          Cidade
        </label>
      </div>

    </div>

    <button
      id="btn"
      class="w-full py-4 rounded-xl bg-gradient-to-r from-blue-600 to-blue-400 text-white font-bold text-lg tracking-wide hover:scale-[1.02] hover:shadow-xl hover:shadow-blue-500/30 transition duration-300"
    >
      Salvar Contato
    </button>

    <h1 class="text-white text-5xl font-bold text-center mt-20 mb-12 tracking-wider">
        Lista de Contatos 
    </h1>



    <div class="max-w-sm mx-auto bg-gradient-to-br bg-blue rounded-xl shadow-md overflow-hidden md:max-w-2xl">
       
        <div id="lista" class="md:shrink-0 text-white">
            <p>

                dshdxffbhnm hrgherhnmhdrseghtrsn
             
            </p>
        </div>
 
       
    </div>
      



  </main>

</body>
</html>
